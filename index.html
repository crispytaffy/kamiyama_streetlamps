<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>神山町 街灯マップ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([33.9720, 134.3611], 15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

fetch("./data/street_lamps.geojson")
  .then(response => {
    if (!response.ok) {
      throw new Error("GeoJSONを読み込めません: " + response.status);
    }
    return response.json();
  })
  .then(data => {
    console.log(data);

    const layer = L.geoJSON(data, {
      onEachFeature: function(feature, layer) {
        const p = feature.properties;

        layer.bindPopup(`
          <strong>街灯</strong><br>
          ID: ${p.id ?? p["@id"] ?? ""}<br>
          種別: ${p.highway ?? ""}<br>
          設置方法: ${p.lamp_mount ?? ""}<br>
          ランプ種別: ${p.lamp_type ?? ""}<br>
          支柱: ${p.support ?? ""}
        `);
      }
    }).addTo(map);

    map.fitBounds(layer.getBounds());
  })
  .catch(error => {
    console.error(error);
    alert(error);
  });
</script>
</body>
</html>
