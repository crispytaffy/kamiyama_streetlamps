<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>神山町 街灯マップ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([33.9720, 134.3611], 15);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    fetch("https://crispytaffy.github.io/kamiyama_streetlamps/data/street_lamps.geojson")
      .then(response => response.json())
      .then(data => {
        L.geoJSON(data, {
          onEachFeature: function(feature, layer) {
            const p = feature.properties;

            layer.bindPopup(`
              <strong>街灯</strong><br>
              ID: ${p.id || ""}<br>
              種別: ${p.highway || ""}<br>
              設置方法: ${p.lamp_mount || ""}<br>
              ランプ種別: ${p.lamp_type || ""}<br>
              支柱: ${p.support || ""}
            `);
          }
        }).addTo(map);
      });
  </script>
</body>
</html>
